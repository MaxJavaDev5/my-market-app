spring:
  r2dbc:
    url: r2dbc:h2:mem:///market_${random.uuid};DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
  sql:
    init:
      mode: never
  security:
    oauth2:
      client:
        registration:
          keycloak:
            provider: keycloak
            authorization-grant-type: client_credentials
            client-id: test-client
            client-secret: test-secret
            scope: openid
        provider:
          keycloak:
            issuer-uri: http://localhost:8180/realms/shop

payment:
  enabled: false
  base-url: http://localhost:18081
