server:
  port: 8080

spring:
  r2dbc:
    url: r2dbc:h2:mem:///marketdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
  sql:
    init:
      mode: never
  data:
    redis:
      host: localhost
      port: 6379
  security:
    oauth2:
      client:
        registration:
          keycloak:
            provider: keycloak
            authorization-grant-type: client_credentials
            client-id: shop-app
            client-secret: TOKEN
            scope: openid
        provider:
          keycloak:
            issuer-uri: http://localhost:8180/realms/shop

payment:
  enabled: true
  base-url: http://localhost:8081
